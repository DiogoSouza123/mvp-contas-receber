services:
  postgres:
    image: postgres:16-alpine
    container_name: mvp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - ./postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    container_name: mvp-api
    depends_on:
      - postgres
      - doc-extractor
      - knowledge-base
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DEFAULT_DELAY_DAYS: 3
      DAILY_RUN_TIME: 08:00
      DEFAULT_FALLBACK_MESSAGE: Recebemos sua mensagem e em breve um operador do contas a receber dara continuidade ao atendimento.
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_INTERNAL_BASE_URL: ${WAHA_INTERNAL_BASE_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL}
      OLLAMA_TEXT_MODEL: ${OLLAMA_TEXT_MODEL}
      DOC_EXTRACTOR_BASE_URL: ${DOC_EXTRACTOR_BASE_URL}
      KNOWLEDGE_BASE_URL: ${KNOWLEDGE_BASE_URL}
    ports:
      - "3000:3000"

  doc-extractor:
    build:
      context: ./doc-extractor
    container_name: mvp-doc-extractor
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_INTERNAL_BASE_URL: ${WAHA_INTERNAL_BASE_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_TEXT_MODEL: ${OLLAMA_TEXT_MODEL}
    ports:
      - "8010:8010"

  knowledge-base:
    build:
      context: ./knowledge-base
    container_name: mvp-knowledge-base
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_TEXT_MODEL: ${OLLAMA_TEXT_MODEL}
      KNOWLEDGE_BASE_SOURCE_DIR: /app/source
      KNOWLEDGE_BASE_INDEX_DIR: /app/index
      KNOWLEDGE_BASE_TOP_K: ${KNOWLEDGE_BASE_TOP_K}
      KNOWLEDGE_BASE_MIN_SCORE: ${KNOWLEDGE_BASE_MIN_SCORE}
    ports:
      - "8011:8011"
    volumes:
      - ./knowledge-base/source:/app/source
      - ./knowledge-base/index:/app/index

  n8n:
    image: n8nio/n8n:1.84.1
    container_name: mvp-n8n
    depends_on:
      - postgres
      - api
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: America/Sao_Paulo
      WAHA_API_KEY: ${WAHA_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL}
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n

  waha:
    image: devlikeapro/waha:latest
    container_name: mvp-waha
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}
      WHATSAPP_DEFAULT_ENGINE: NOWEB
    ports:
      - "3001:3000"
